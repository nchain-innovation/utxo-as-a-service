
networks:
  uaas_network:
    external: false
    name: uaas_network

services:
  # Database (MariaDB — MySQL-compatible, multi-arch including Apple Silicon)
  database:
    container_name: uaas_database
    image: mariadb:11.4
    cap_add:
      - SYS_NICE
    restart: always
    ports:
      - "3307:3306"
    networks:
      - uaas_network
    environment:
        MARIADB_ROOT_PASSWORD: mysql
        MARIADB_DATABASE: db
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
        - ./data/mysql:/var/lib/mysql
        - ./init_database:/docker-entrypoint-initdb.d/:ro

  # Basic GUI for interacting with database
  adminer:
    container_name: uaas_db_admin
    image: adminer
    restart: always
    depends_on:
      database:
        condition: service_healthy
    ports:
      - 8080:8080
    networks:
      - uaas_network

  # UaaS backend
  uaas_backend:
    container_name: uaas_backend
    image: uaas-service
    ports:
      - "8081:8081"
    networks:
      - uaas_network
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - ./data:/app/data
      - ./data/uaasr.docker.toml:/app/data/uaasr.toml:ro
    restart: on-failure

  # UaaS web API
  uaas_web:
    container_name: uaas_web
    image: uaas-web
    ports:
      - "5010:5010"
    networks:
      - uaas_network
    depends_on:
      database:
        condition: service_healthy
      uaas_backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5010/health')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./python/src:/app/python
      - ./data:/app/data
      - ./data/uaasr.docker.toml:/app/data/uaasr.toml:ro
    restart: on-failure
